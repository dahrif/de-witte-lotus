backend:
  name: git-gateway
  branch: master

locale: nl
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "instellingen"
    label: "⚙️ Website instellingen"
    files:
      - name: "contact"
        label: "📞 Contactgegevens"
        file: "data/contact.json"
        fields:
          - {label: "Telefoonnummer", name: "telefoon", widget: "string", hint: "Bijv. +31 20 123 4567"}
          - {label: "E-mailadres", name: "email", widget: "string"}
          - {label: "Adres", name: "adres", widget: "string"}
          - {label: "Openingstijden", name: "openingstijden", widget: "string", hint: "Bijv. Ma-Vr 9:00-17:00"}

      - name: "hero"
        label: "🏠 Homepagina teksten"
        file: "data/hero.json"
        fields:
          - {label: "Grote titel", name: "titel", widget: "string"}
          - {label: "Intro tekst", name: "intro", widget: "text"}

      - name: "beloftes"
        label: "✨ Onze beloftes"
        file: "data/beloftes.json"
        fields:
          - label: "Belofte 1"
            name: "b1"
            widget: "object"
            fields:
              - {label: "Titel", name: "titel", widget: "string"}
              - {label: "Tekst", name: "tekst", widget: "text"}
          - label: "Belofte 2"
            name: "b2"
            widget: "object"
            fields:
              - {label: "Titel", name: "titel", widget: "string"}
              - {label: "Tekst", name: "tekst", widget: "text"}
          - label: "Belofte 3"
            name: "b3"
            widget: "object"
            fields:
              - {label: "Titel", name: "titel", widget: "string"}
              - {label: "Tekst", name: "tekst", widget: "text"}

      - name: "diensten"
        label: "🏥 Diensten"
        file: "data/diensten.json"
        fields:
          - label: "Ambulante begeleiding"
            name: "ambulant"
            widget: "object"
            fields:
              - {label: "Titel", name: "titel", widget: "string"}
              - {label: "Omschrijving", name: "tekst", widget: "text"}
          - label: "Wonen met begeleiding"
            name: "wonen"
            widget: "object"
            fields:
              - {label: "Titel", name: "titel", widget: "string"}
              - {label: "Omschrijving", name: "tekst", widget: "text"}
